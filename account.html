<!DOCTYPE html>
<html>
<head>
    <title>CampusCard - Checkout</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="STY1.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100%;
        }

        /* Background Image */
        body {
            background: url("images/BACKGROUND1.jpg") no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        h1 {
            text-align: center;
        }

        .navbar {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        .navbar a:hover {
            color: #f39c12;
        }

        /* Checkout Card */
        .checkout-box {
            width: 350px;
            margin: 40px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            backdrop-filter: blur(6px);
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: none;
        }

        .donation-box {
            margin-top: 15px;
        }

        .btn {
            margin-top: 20px;
            padding: 10px;
            width: 100%;
            border: none;
            background-color: #2c3e50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #f39c12;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.6);
        }

    </style>
</head>

<body>

<h1>🛒 Checkout & Payment</h1>

<div class="navbar">
    <a href="home.html">HOME</a>
    <a href="categories.html">CATEGORIES</a>
    <a href="offers.html">OFFERS</a>
    <a href="account.html">ACCOUNT</a>
</div>

<div class="checkout-box">

    <h3>Delivery Details</h3>

    <label>Full Name</label>
    <input type="text" placeholder="Enter your name">

    <label>Mobile Number</label>
    <input type="text" placeholder="Enter mobile number">

    <label>Delivery Address</label>
    <input type="text" placeholder="Enter address">

    <label>Payment Method</label>
    <select>
        <option>UPI</option>
        <option>Debit Card</option>
        <option>Credit Card</option>
        <option>Cash on Delivery</option>
    </select>

    <!-- Donation Option -->
    <div class="donation-box">
        <h3>Support Education Fund ❤️</h3>
        <p>Add ₹2 donation to help needy students?</p>

        <input type="radio" name="donation" value="yes"> I am Interested to Pay ₹2<br>
        <input type="radio" name="donation" value="no"> I am Not Interested
    </div>

    <!-- Confirm Button -->
    <button class="btn" onclick="confirmOrder()">Confirm Order</button>

</div>

<footer>
    <p>&copy; 2026 CampusCard | All Rights Reserved</p>
</footer>

<script>
function confirmOrder() {
    let donation = document.querySelector('input[name="donation"]:checked');

    if (!donation) {
        alert("Please select donation option.");
        return;
    }

    if (donation.value === "yes") {
        alert("Order Confirmed! ₹2 donation added. Thank you for supporting ❤️");
    } else {
        alert("Order Confirmed Successfully! Thank you for shopping 🛍️");
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>CampusCard - Home</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="STY1.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }

        /* Full Page Background Image */
        body {
            background: url("images/BACKGROUND1.jpg") no-repeat center center fixed;
            background-size: cover;
            color: white;   /* Make text visible */
        }

        h1 {
            text-align: center;
        }

        .navbar {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 10px;
            text-align: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        .navbar a:hover {
            color: #f39c12;
        }

        .home-images {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 40px;
        }

        .product {
            background: rgba(255, 255, 255, 0.2); /* transparent card */
            padding: 15px;
            border-radius: 10px;
            width: 180px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .product img {
            width: 100px;
            height: 100px;
            object-fit: cover;
        }

        .btn {
            margin-top: 10px;
            padding: 8px 12px;
            border: none;
            background-color: #2c3e50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #f39c12;
        }

        footer {
            margin-top: 40px;
            background-color: rgba(0, 0, 0, 0.6);
            text-align: center;
            padding: 15px;
        }

    </style>
</head>

<body>

    <h1>WELCOME TO CAMPUSCART</h1>

    <div class="navbar">
        <a href="home.html">HOME</a>
        <a href="categories.html">CATEGORIES</a>
        <a href="offers.html">OFFERS</a>
        <a href="account.html">ACCOUNT</a>
    </div>

    <div class="home-images">

        <div class="product">
            <img src="images/pens.png" alt="Pens">
            <h3>Pen Set</h3>
            <button class="btn">NEXT</button>
        </div>

        <div class="product">
            <img src="images/bags.webp" alt="Bag">
            <h3>School Bag</h3>
            <button class="btn">NEXT</button>
        </div>

        <div class="product">
            <img src="images/books.jpg" alt="Books">
            <h3>Notebook Pack</h3>
            <button class="btn">NEXT</button>
        </div>
        <div class="product">
            <img src="images/colorpaper.png" alt="Books">
            <h3>Colour Paper pack</h3>
            <button class="btn">NEXT</button>
        </div>
        <div class="product">
            <img src="images/pencil.png" alt="Books">
            <h3>pencils set</h3>
            <button class="btn">NEXT</button>
        </div>
        <div class="product">
            <img src="images/scale3.jpg" alt="Books">
            <h3>scales</h3>
            <button class="btn">NEXT</button>
        </div>
       <div class="product">
            <img src="images/MAPS.jpg" alt="map">
            <h3>MAPS</h3>
            <button class="btn">NEXT</button>
        </div>
<div class="product">
            <img src="images/GEOMETRY.jpg" alt="map">
            <h3>GEOMETRIC SET</h3>
            <button class="btn">NEXT</button>
        </div>
<div class="product">
            <img src="images/EXAM PADS.jpg" alt="EXAP PADS">
            <h3>EXAM PADS</h3>
            <button class="btn">NEXT</button>
        </div>
        <div class="product">
            <img src="images/FILES.jpg" alt="FILES">
            <h3>FILES</h3>
            <button class="btn">NEXT</button>
        </div>


    

    

</body>
</html>
